# slurmdbd.service (EXAMPLE)
# Place into /etc/systemd/system/slurmdbd.service (after replacing placeholders)

[Unit]
Description=Slurm DBD accounting daemon
After=network.target munge.service mariadb.service
Wants=munge.service mariadb.service

[Service]
Type=simple

# User/Group to run slurmdbd (commonly "slurm")
User=<SLURM_USER>
Group=<SLURM_GROUP>

# Path to slurmdbd binary (varies by install method)
ExecStart=<SLURMDBD_BIN> -D -s

# Configuration path (ensure slurmdbd.conf exists with 600 perms)
Environment=SLURM_CONF=<SLURM_CONF_PATH>             # e.g. /etc/slurm/slurm.conf
Environment=SLURMDBD_CONF=<SLURMDBD_CONF_PATH>       # e.g. /etc/slurm/slurmdbd.conf

Restart=on-failure
RestartSec=5

# Optional hardening (enable if compatible)
# NoNewPrivileges=true
# PrivateTmp=true

[Install]
WantedBy=multi-user.target