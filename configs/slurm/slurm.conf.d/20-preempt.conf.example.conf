###############################################################################
# Preemption (EXAMPLE)
# - Higher-priority partitions can preempt lower-priority jobs
###############################################################################

# Preemption plugin:
# - preempt/partition_prio : uses partition priority to decide preemption
PreemptType=preempt/partition_prio

# Behavior when preempted:
# - REQUEUE : requeue the job (commonly used)
# - CANCEL  : cancel the job
# - SUSPEND : suspend the job (if supported)
PreemptMode=REQUEUE