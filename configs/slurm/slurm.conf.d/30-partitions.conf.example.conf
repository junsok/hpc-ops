###############################################################################
# Partitions (EXAMPLE)
# - Replace placeholders with your cluster values
###############################################################################
# TIME formats:
# - HH:MM:SS
# - D-HH:MM:SS
#
# Nodes hostlist examples:
# - compute-[1-4]
# - gpu-[01-08]
# - node01
#
# Priority:
# - relative integer (dimensionless). Higher => scheduled earlier in partition_prio use cases.

# debug: short jobs
PartitionName=debug \
  Nodes=<NODELIST_DEBUG> \
  Priority=<INT> \
  MaxTime=<TIME> \
  Default=NO \
  State=UP \
  AllowQOS=<QOS_NAME>

# normal: default partition for most jobs
PartitionName=normal \
  Nodes=<NODELIST_NORMAL> \
  Priority=<INT> \
  MaxTime=<TIME> \
  Default=YES \
  State=UP \
  AllowQOS=<QOS_NAME>

# priority: higher priority jobs (more resources)
PartitionName=priority \
  Nodes=<NODELIST_PRIORITY> \
  Priority=<INT> \
  MaxTime=<TIME> \
  Default=NO \
  State=UP \
  AllowQOS=<QOS_NAME>

# serve: inference/serving style jobs
PartitionName=serve \
  Nodes=<NODELIST_SERVE> \
  Priority=<INT> \
  Default=NO \
  State=UP \
  AllowQOS=<QOS_NAME>

# exclusive: special partition, can override preempt behavior per partition
PartitionName=exclusive \
  Nodes=<NODELIST_EXCLUSIVE> \
  Priority=<INT> \
  MaxTime=<TIME> \
  Default=NO \
  State=UP \
  PreemptMode=REQUEUE \
  AllowQOS=<QOS_NAME>