###############################################################################
# Accounting / SlurmDBD integration (EXAMPLE)
###############################################################################
# SlurmDBD:
# - slurmdbd should be running and reachable
# - slurmctld will write accounting records via slurmdbd

# Enable Slurm accounting
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=<SLURMDBD_HOST>      # e.g. localhost or slurmdbd.internal
AccountingStoragePort=<PORT>               # e.g. 6819

# Trackable resources (TRES)
# Common set: cpu,mem,energy,node,billing,gres/gpu
AccountingStorageTRES=cpu,mem,energy,node,billing,gres/gpu

# Policy enforcement (examples)
# - limits: enforce resource limits
# - qos: enforce QOS rules
# - associations: enforce user/account associations
AccountingStorageEnforce=limits,qos,associations

# Optional: job accounting gather plugin (common on Linux)
JobAcctGatherType=jobacct_gather/linux