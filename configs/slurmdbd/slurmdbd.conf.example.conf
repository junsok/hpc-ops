###############################################################################
# slurmdbd.conf (EXAMPLE)
# - DO NOT commit real passwords or hostnames
# - This file should be owned by SlurmUser and mode 600 in production
###############################################################################

# Authentication
AuthType=auth/munge

# SlurmDBD listen address/port
DbdHost=<SLURMDBD_HOST>                # e.g. localhost or slurmdbd.internal
DbdPort=<PORT>                         # e.g. 6819

# Slurm service user
SlurmUser=<SLURM_USER>                 # e.g. slurm

# Storage backend (MariaDB/MySQL)
StorageType=accounting_storage/mysql
StorageHost=<DB_HOST>                  # e.g. localhost
StorageLoc=<DB_NAME>                   # e.g. slurm_acct_db
StorageUser=<DB_USER>                  # e.g. slurm
StoragePass=<DB_PASSWORD>              # DO NOT COMMIT REAL PASSWORD

# Logging / PID files
LogFile=<LOG_PATH>                     # e.g. /var/log/slurm/slurmdbd.log
PidFile=<PID_PATH>                     # e.g. /var/run/slurm/slurmdbd.pid

# Optional: message timeout (seconds)
# MessageTimeout=<SECONDS>